<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Combos - Font Generator Free</title>
    <link rel="canonical" href="https://fontgeneratorfree.online/combo.html" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm py-4 px-4">
        <div class="container mx-auto max-w-4xl flex items-center justify-between flex-wrap gap-3">
            <a href="index.html" class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
                Font Generator Free
            </a>
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-sm text-blue-600 font-semibold hover:text-blue-700">Generator</a>
                <a href="pricing.html" class="text-sm text-blue-600 font-semibold hover:text-blue-700">Pricing</a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 max-w-4xl py-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">🎨 My Font Combos</h1>
            <button onclick="showCreateModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700">
                + New Combo
            </button>
        </div>

        <p class="text-gray-500 text-sm mb-4">Free users can create up to 3 combos. <a href="pricing.html" class="text-blue-600 font-semibold">Upgrade to Pro</a> for unlimited combos & cloud sync.</p>

        <!-- 组合列表 -->
        <div id="combo-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

        <!-- 空状态 -->
        <div id="empty-state" class="hidden text-center py-12">
            <div class="text-6xl mb-4">🎨</div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">No combos yet</h3>
            <p class="text-gray-500 mb-4">Create your first font combo!</p>
            <button onclick="showCreateModal()" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700">Create Combo</button>
        </div>
    </main>

    <!-- 创建组合弹窗 -->
    <div id="create-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4">
            <h2 class="text-xl font-bold mb-4">Create Font Combo</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Combo Name</label>
                <input id="combo-name" type="text" class="w-full p-2 border border-gray-300 rounded-lg" placeholder="My Favorite Combo">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Fonts</label>
                <div id="font-selector" class="grid grid-cols-4 gap-2 max-h-48 overflow-y-auto"></div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Preview</label>
                <div id="combo-preview" class="p-3 bg-gray-50 rounded-lg text-sm text-gray-400">Select fonts to preview...</div>
            </div>
            
            <div class="flex gap-2 justify-end">
                <button onclick="closeCreateModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button onclick="createCombo()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save</button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto">
        <p>&copy; <span id="year"></span> Font Generator Free. All rights reserved.</p>
    </footer>

    <script>
    (function() {
        var STORAGE_KEY = 'fg_saved_combos';
        var FREE_LIMIT = 3;
        var fontNames = ['Bold','Italic','Bold Italic','Cursive','Bold Cursive','Double Struck','Bubble','Black Bubble','Gothic','Bold Gothic','Square','Black Square','Monospace','Upside Down','Small Caps','Subscript','Superscript','Strikethrough','Underline','Wide','Parenthesized','Tiny','Zalgo','Crossed','Arrow','Heart','Star','Dot','Bracket','Wave'];
        var selectedFonts = [];
        var loadedCombos = [];

        document.getElementById('year').textContent = new Date().getFullYear();

        // === Storage ===
        function getCombos() {
            try {
                var d = localStorage.getItem(STORAGE_KEY);
                return d ? JSON.parse(d) : [];
            } catch(e) { return []; }
        }

        function saveCombos(combos) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(combos));
        }

        // === Render ===
        function loadCombos() {
            loadedCombos = getCombos();
            var list = document.getElementById('combo-list');
            var empty = document.getElementById('empty-state');

            if (loadedCombos.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                list.innerHTML = '';
                loadedCombos.forEach(function(combo, idx) {
                    var fonts = combo.fonts || [];
                    var div = document.createElement('div');
                    div.className = 'bg-white p-4 rounded-xl shadow-sm border border-gray-100';
                    div.innerHTML = '<div class="flex justify-between items-start mb-3">' +
                        '<div><h3 class="font-bold text-gray-800">' + escapeHtml(combo.name) + '</h3>' +
                        '<p class="text-xs text-gray-500">' + fonts.length + ' fonts</p></div>' +
                        '<div class="flex gap-2">' +
                        '<button class="text-blue-600 text-sm font-medium hover:underline" data-use="' + idx + '">Use</button>' +
                        '<button class="text-red-500 text-sm font-medium hover:underline" data-del="' + idx + '">Delete</button>' +
                        '</div></div>' +
                        '<div class="flex flex-wrap gap-1">' +
                        fonts.map(function(f) { return '<span class="text-xs bg-gray-100 px-2 py-1 rounded">' + escapeHtml(f) + '</span>'; }).join('') +
                        '</div>';
                    list.appendChild(div);
                });

                // 绑定事件
                list.querySelectorAll('[data-use]').forEach(function(btn) {
                    btn.onclick = function() { useCombo(parseInt(btn.dataset.use)); };
                });
                list.querySelectorAll('[data-del]').forEach(function(btn) {
                    btn.onclick = function() { deleteCombo(parseInt(btn.dataset.del)); };
                });
            }
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // === Actions ===
        window.showCreateModal = function() {
            var combos = getCombos();
            if (combos.length >= FREE_LIMIT) {
                alert('Free users are limited to ' + FREE_LIMIT + ' combos. Upgrade to Pro for unlimited!');
                return;
            }
            selectedFonts = [];
            document.getElementById('combo-name').value = '';
            document.getElementById('combo-preview').textContent = 'Select fonts to preview...';
            document.getElementById('create-modal').classList.remove('hidden');
            document.getElementById('create-modal').classList.add('flex');
            initFontSelector();
        };

        window.closeCreateModal = function() {
            document.getElementById('create-modal').classList.add('hidden');
            document.getElementById('create-modal').classList.remove('flex');
            selectedFonts = [];
        };

        function initFontSelector() {
            var container = document.getElementById('font-selector');
            container.innerHTML = '';
            fontNames.forEach(function(name) {
                var btn = document.createElement('button');
                btn.className = 'p-2 rounded-lg bg-gray-100 text-xs font-medium hover:bg-blue-100 transition';
                btn.textContent = name;
                btn.dataset.font = name;
                btn.onclick = function() { toggleFont(name, btn); };
                container.appendChild(btn);
            });
        }

        function toggleFont(name, btn) {
            var pos = selectedFonts.indexOf(name);
            if (pos > -1) {
                selectedFonts.splice(pos, 1);
                btn.className = 'p-2 rounded-lg bg-gray-100 text-xs font-medium hover:bg-blue-100 transition';
            } else {
                selectedFonts.push(name);
                btn.className = 'p-2 rounded-lg bg-blue-600 text-white text-xs font-medium transition';
            }
            updatePreview();
        }

        function updatePreview() {
            var preview = document.getElementById('combo-preview');
            if (selectedFonts.length === 0) {
                preview.textContent = 'Select fonts to preview...';
                preview.className = 'p-3 bg-gray-50 rounded-lg text-sm text-gray-400';
            } else {
                preview.textContent = selectedFonts.join(', ');
                preview.className = 'p-3 bg-gray-50 rounded-lg text-sm text-blue-600';
            }
        }

        window.createCombo = function() {
            var name = document.getElementById('combo-name').value.trim();
            if (!name) { alert('Please enter a name'); return; }
            if (selectedFonts.length === 0) { alert('Please select at least one font'); return; }

            var combos = getCombos();
            combos.push({ name: name, fonts: selectedFonts.slice(), created: Date.now() });
            saveCombos(combos);
            closeCreateModal();
            loadCombos();
        };

        function useCombo(idx) {
            var combo = loadedCombos[idx];
            if (combo) {
                localStorage.setItem('fg_current_combo', JSON.stringify(combo));
                window.location.href = 'index.html';
            }
        }

        function deleteCombo(idx) {
            if (!confirm('Delete this combo?')) return;
            var combos = getCombos();
            combos.splice(idx, 1);
            saveCombos(combos);
            loadCombos();
        }

        // 初始化
        loadCombos();
    })();
    </script>
</body>
</html>
