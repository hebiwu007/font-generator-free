<!DOCTYPE html>
<html>
<head>
<script src="script.js"></script>
</head>
<body>
<div id="out"></div>
<script>
try {
    var info = [];
    info.push("fontDictionaries: " + (typeof fontDictionaries !== "undefined"));
    info.push("baseChars: " + (typeof baseChars !== "undefined"));
    info.push("fontDictionaries.length: " + (fontDictionaries ? fontDictionaries.length : "N/A"));
    
    var bold = fontDictionaries[0];
    info.push("Bold a -> code: " + bold.charMap.get("a").codePointAt(0).toString(16));
    info.push("expected: 1d41a");
    
    var r = generateFonts("abc");
    for (var i = 0; i < 3; i++) {
        var codes = [];
        for (var j = 0; j < r[i].text.length; j++) {
            codes.push(r[i].text.codePointAt(j).toString(16));
        }
        info.push(r[i].name + ": [" + codes.join(",") + "]");
    }
    
    document.getElementById("out").textContent = info.join("\n");
} catch(e) {
    document.getElementById("out").textContent = "ERROR: " + e.message;
}
</script>
</body>
</html>
